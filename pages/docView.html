<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-Space</title>
    <link rel="stylesheet" href="/style/index.css">
    <script src="/utils.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor/dist/index.css" />
    <script src="https://cdn.jsdelivr.net/npm/vditor/dist/index.min.js"></script>
</head>

<body id="body">
    <script>
        mount("body", "afterbegin", "nav")
    </script>
    <main>
        <article>
            <div id="preview"></div>
        </article>
        <aside>
            <div id="outline"></div>
        </aside>
    </main>
    <script>
        const initOutline = () => {
            const headingElements = []
            Array.from(document.getElementById('preview').children).forEach((item) => {
                if (item.tagName.length === 2 && item.tagName !== 'HR' && item.tagName.indexOf('H') === 0) {
                    headingElements.push(item)
                }
            })

            let toc = []
            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY
                toc = []
                headingElements.forEach((item) => {
                    toc.push({
                        id: item.id,
                        offsetTop: item.offsetTop,
                    })
                })

                const currentElement = document.querySelector('.vditor-outline__item--current')
                for (let i = 0, iMax = toc.length; i < iMax; i++) {
                    if (scrollTop < toc[i].offsetTop - 30) {
                        if (currentElement) {
                            currentElement.classList.remove('vditor-outline__item--current')
                        }
                        let index = i > 0 ? i - 1 : 0
                        document.querySelector('span[data-target-id="' + toc[index].id + '"]').classList.add('vditor-outline__item--current')
                        break
                    }
                }
            })
        }
        fetch('/docs/test/Helloworld.md').
            then(response => response.text()).
            then(markdown => {
                Vditor.preview(document.getElementById('preview'),
                    markdown, {
                    speech: {
                        enable: true,
                    },
                    anchor: 1,
                    after() {
                        if (window.innerWidth <= 768) {
                            return
                        }
                        const outlineElement = document.getElementById('outline')
                        Vditor.outlineRender(document.getElementById('preview'), outlineElement)
                        if (outlineElement.innerText.trim() !== '') {
                            outlineElement.style.display = 'block'
                            initOutline()
                        }
                    },
                })
            })
    </script>
</body>

</html>
